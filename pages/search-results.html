<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search Results — MLRIT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/navbar.css" />
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/css/search-integration.css" />
  <link rel="stylesheet" href="/modules/search/styles/search.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    body { font-family: 'Poppins', sans-serif; background: #f8f9fa; color: #333; }

    /* Account for sticky header (masthead ~89px + nav ~48px = ~137px) */
    body > header.site-header {
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    /* Push page content below the sticky header */
    .results-hero {
      scroll-margin-top: 137px;
    }

    .results-hero {
      background: linear-gradient(135deg, #1F6B24, #2a8030);
      padding: 60px 20px 40px;
      color: white;
    }
    .results-hero h1 {
      font-family: 'Montserrat', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 6px;
    }
    .results-hero p { opacity: 0.85; font-size: 0.95rem; }
    .results-hero strong { color: #f5c518; }

    .results-container {
      max-width: 900px;
      margin: 40px auto 80px;
      padding: 0 20px;
    }

    .results-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 28px;
      border-bottom: 2px solid #e0e0e0;
      padding-bottom: 0;
    }
    .results-tab {
      padding: 10px 20px;
      border: none;
      background: none;
      font-family: 'Poppins', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      color: #888;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: color 0.2s, border-color 0.2s;
    }
    .results-tab.active { color: #1F6B24; border-bottom-color: #1F6B24; }
    .results-tab:hover { color: #1F6B24; }
    .results-tab .tab-count {
      background: #e8f5e9;
      color: #1F6B24;
      font-size: 0.75rem;
      padding: 2px 7px;
      border-radius: 10px;
      margin-left: 6px;
    }
    .results-tab.active .tab-count { background: #1F6B24; color: white; }

    .results-section { display: none; }
    .results-section.active { display: block; }

    .result-card {
      background: white;
      border-radius: 10px;
      padding: 20px 24px;
      margin-bottom: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      border-left: 4px solid #1F6B24;
      transition: transform 0.2s, box-shadow 0.2s;
      text-decoration: none;
      display: block;
      color: inherit;
    }
    .result-card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
    .result-card h3 {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: #1F6B24;
      margin-bottom: 6px;
    }
    .result-card p { font-size: 0.9rem; color: #555; line-height: 1.6; margin: 0; }
    .result-card .result-url { font-size: 0.78rem; color: #aaa; margin-top: 6px; }

    .chronicle-result-card {
      background: white;
      border-radius: 10px;
      padding: 20px 24px;
      margin-bottom: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      border-left: 4px solid #E85D1F;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .chronicle-result-card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
    .chronicle-result-card .card-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .chronicle-result-card .card-category {
      background: #E85D1F;
      color: white;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 3px 10px;
      border-radius: 20px;
    }
    .chronicle-result-card .card-date { font-size: 0.82rem; color: #aaa; }
    .chronicle-result-card h3 {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 8px;
    }
    .chronicle-result-card p { font-size: 0.9rem; color: #555; line-height: 1.6; margin: 0; }

    mark {
      background: #fff3cd;
      color: #333;
      border-radius: 2px;
      padding: 0 2px;
      font-style: normal;
    }

    .no-results {
      text-align: center;
      padding: 60px 20px;
      color: #888;
    }
    .no-results i { font-size: 3.5rem; color: #ddd; display: block; margin-bottom: 16px; }
    .no-results h3 { font-size: 1.2rem; color: #555; margin-bottom: 8px; }
    .no-results p { font-size: 0.9rem; }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: rgba(255,255,255,0.8);
      text-decoration: none;
      font-size: 0.9rem;
      margin-bottom: 16px;
      transition: color 0.2s;
    }
    .back-link:hover { color: white; }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <header class="site-header">
    <div class="masthead top-header">
      <div class="container masthead__inner">
        <a href="/" class="masthead__logo" aria-label="MLRIT Home">
          <img src="https://i.ibb.co/zHVr8JGd/mlrit-logo-new.png" alt="MLRIT Logo" />
        </a>
        <div class="masthead__tagline">
          <span>MLR Institute of Technology</span>
        </div>
        <div class="header-right">
          <a href="#" class="masthead__eapcet">EAPCET CODE : MLID</a>
          <!-- Search icon injected here by SearchSystem.init() -->
        </div>
      </div>
    </div>
    <nav class="main-nav" aria-label="Main navigation">
      <div class="container main-nav__inner">
        <ul class="main-nav__list">
          <li class="main-nav__item"><a href="/" class="main-nav__link">Home</a></li>
          <li class="main-nav__item"><a href="https://mlrit.ac.in/admissions/" class="main-nav__link">Admissions</a></li>
          <li class="main-nav__item"><a href="https://mlrit.ac.in/placements/" class="main-nav__link">Placements</a></li>
          <li class="main-nav__item"><a href="/pages/chronicles.html" class="main-nav__link">Chronicles</a></li>
        </ul>
      </div>
    </nav>
  </header>

  <!-- HERO -->
  <div class="results-hero">
    <div style="max-width:900px; margin:0 auto; padding:0 20px;">
      <a href="javascript:history.back()" class="back-link">
        <i class="fas fa-arrow-left"></i> Back
      </a>
      <h1>Search Results</h1>
      <p>Showing results for <strong id="queryDisplay"></strong></p>
    </div>
  </div>

  <!-- RESULTS -->
  <div class="results-container">

    <!-- Tabs -->
    <div class="results-tabs">
      <button class="results-tab active" data-tab="all">
        All <span class="tab-count" id="allCount">0</span>
      </button>
      <button class="results-tab" data-tab="pages">
        Pages <span class="tab-count" id="pagesCount">0</span>
      </button>
      <button class="results-tab" data-tab="news">
        News &amp; Chronicles <span class="tab-count" id="newsCount">0</span>
      </button>
    </div>

    <!-- All results -->
    <div class="results-section active" id="tab-all">
      <div id="allResults"></div>
    </div>

    <!-- Pages only -->
    <div class="results-section" id="tab-pages">
      <div id="pageResults"></div>
    </div>

    <!-- News/Chronicles only -->
    <div class="results-section" id="tab-news">
      <div id="newsResults"></div>
    </div>

  </div>

  <!-- Search module scripts -->
  <script src="/modules/search/data/searchData.js?v=2"></script>
  <script src="/modules/search/data/chroniclesData.js?v=2"></script>
  <script src="/modules/search/utils/searchEngine.js?v=2"></script>
  <script src="/modules/search/components/SearchOverlay.js?v=2"></script>
  <script src="/modules/search/components/SearchInput.js?v=2"></script>
  <script src="/modules/search/components/FAQList.js?v=2"></script>
  <script src="/modules/search/components/SearchResultsPreview.js?v=2"></script>
  <script src="/modules/search/index.js?v=2"></script>
  <script>
  document.addEventListener('DOMContentLoaded', function () {
    // Init search system
    if (window.SearchSystem) {
        window.SearchSystem.init({
            basePath:   '/',
            apiBase:    '',
            debounceMs: 300,
            faqItems:   []
        });
    }

    // Get query from URL
    var params = new URLSearchParams(window.location.search);
    var query  = params.get('q') || '';

    document.getElementById('queryDisplay').textContent = '"' + query + '"';
    document.title = 'Search: ' + query + ' — MLRIT';

    var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

    function formatDate(iso) {
      var d = new Date(iso);
      return d.getDate() + ' ' + months[d.getMonth()] + ' ' + d.getFullYear();
    }

    function highlight(text, q) {
      if (!q) return text;
      var escaped = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      return text.replace(new RegExp('(' + escaped + ')', 'gi'), '<mark>$1</mark>');
    }

    // Search pages
    var pageResults      = window.StaticSearchData ? window.StaticSearchData.search(query, '/') : [];
    // Search chronicles — URLs are already absolute, no basePath needed
    var chronicleResults = window.ChroniclesData   ? window.ChroniclesData.search(query)        : [];

    // Update counts
    document.getElementById('allCount').textContent   = pageResults.length + chronicleResults.length;
    document.getElementById('pagesCount').textContent = pageResults.length;
    document.getElementById('newsCount').textContent  = chronicleResults.length;

    function renderPageCard(item) {
      var isExternal = item.url && item.url.indexOf('http') === 0;
      var targetAttr = isExternal ? ' target="_blank" rel="noopener noreferrer"' : '';
      return '<a class="result-card" href="' + item.url + '"' + targetAttr + '>' +
        '<h3>' + highlight(item.title, query) + '</h3>' +
        '<p>' + highlight(item.snippet || '', query) + '</p>' +
        '<div class="result-url"><i class="fas fa-link"></i> ' + item.url + '</div>' +
        '</a>';
    }

    function renderChronicleCard(item) {
      return '<div class="chronicle-result-card">' +
        '<div class="card-meta">' +
          '<span class="card-category">' + item.category + '</span>' +
          '<span class="card-date"><i class="far fa-calendar-alt"></i> ' + formatDate(item.date) + '</span>' +
        '</div>' +
        '<h3>' + highlight(item.title, query) + '</h3>' +
        '<p>' + highlight(item.snippet || '', query) + '</p>' +
        '</div>';
    }

    var noResultsHTML = '<div class="no-results">' +
      '<i class="fas fa-search-minus"></i>' +
      '<h3>No results found</h3>' +
      '<p>Try a different search term</p>' +
      '</div>';

    // All tab
    var allHTML = '';
    if (pageResults.length)      allHTML += pageResults.map(renderPageCard).join('');
    if (chronicleResults.length) allHTML += chronicleResults.map(renderChronicleCard).join('');
    document.getElementById('allResults').innerHTML  = allHTML || noResultsHTML;

    // Pages tab
    document.getElementById('pageResults').innerHTML =
      pageResults.length ? pageResults.map(renderPageCard).join('') : noResultsHTML;

    // News tab
    document.getElementById('newsResults').innerHTML =
      chronicleResults.length ? chronicleResults.map(renderChronicleCard).join('') : noResultsHTML;

    // Tab switching
    document.querySelectorAll('.results-tab').forEach(function(tab) {
      tab.addEventListener('click', function() {
        document.querySelectorAll('.results-tab').forEach(function(t) { t.classList.remove('active'); });
        document.querySelectorAll('.results-section').forEach(function(s) { s.classList.remove('active'); });
        tab.classList.add('active');
        document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
      });
    });
  });
  </script>

</body>
</html>
