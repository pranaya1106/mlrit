<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MLRIT Chronicles — News, Achievements & Events</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/navbar.css" />
  <link rel="stylesheet" href="/css/main.css" />
  <!-- Search module CSS -->
  <link rel="stylesheet" href="/css/search-integration.css" />
  <link rel="stylesheet" href="/modules/search/styles/search.css" />
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: #f8f9fa;
      color: #333;
    }

    .chronicles-hero {
      background: linear-gradient(135deg, #1F6B24, #2a8030);
      color: white;
      padding: 80px 20px 60px;
      text-align: center;
    }

    .chronicles-hero h1 {
      font-family: 'Montserrat', sans-serif;
      font-size: 3rem;
      font-weight: 800;
      margin-bottom: 1rem;
    }

    .chronicles-hero p {
      font-size: 1.1rem;
      opacity: 0.9;
    }

    .chronicles-container {
      max-width: 1200px;
      margin: -40px auto 60px;
      padding: 0 20px;
    }

    .filter-bar {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      margin-bottom: 30px;
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-bar label {
      font-weight: 600;
      color: #1F6B24;
    }

    .filter-bar select,
    .filter-bar input {
      padding: 8px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.95rem;
    }

    .filter-bar select:focus,
    .filter-bar input:focus {
      outline: none;
      border-color: #1F6B24;
    }

    .chronicles-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 25px;
    }

    .chronicle-card {
      background: white;
      border-radius: 12px;
      padding: 25px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      transition: transform 0.3s, box-shadow 0.3s;
      border-left: 4px solid #1F6B24;
    }

    .chronicle-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
    }

    .chronicle-category {
      display: inline-block;
      background: #E85D1F;
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }

    .chronicle-date {
      color: #888;
      font-size: 0.85rem;
      margin-bottom: 10px;
    }

    .chronicle-title {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: #1F6B24;
      margin-bottom: 12px;
      line-height: 1.3;
    }

    .chronicle-description {
      color: #555;
      line-height: 1.7;
      font-size: 0.95rem;
    }

    .no-results {
      text-align: center;
      padding: 60px 20px;
      color: #888;
    }

    .no-results i {
      font-size: 4rem;
      color: #ddd;
      margin-bottom: 20px;
      display: block;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: rgba(255,255,255,0.85);
      text-decoration: none;
      font-size: 0.9rem;
      margin-bottom: 16px;
      transition: color 0.2s;
    }

    .back-link:hover { color: white; }

    @media (max-width: 768px) {
      .chronicles-hero h1 { font-size: 2rem; }
      .chronicles-grid { grid-template-columns: 1fr; }
      .filter-bar { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>
<body>

  <!-- =====================
       NAVBAR
       ===================== -->
  <header class="site-header">
    <div class="masthead top-header">
      <div class="container masthead__inner">
        <a href="/" class="masthead__logo" aria-label="MLRIT Home">
          <img src="https://i.ibb.co/zHVr8JGd/mlrit-logo-new.png" alt="MLRIT Logo" />
        </a>
        <div class="masthead__tagline">
          <span>MLR Institute of Technology</span>
        </div>
        <div class="header-right">
          <a href="#" class="masthead__eapcet">EAPCET CODE : MLID</a>
          <!-- Search icon injected here by SearchSystem.init() -->
        </div>
      </div>
    </div>

    <nav class="main-nav" aria-label="Main navigation">
      <div class="container main-nav__inner">
        <ul class="main-nav__list">
          <li class="main-nav__item">
            <a href="/" class="main-nav__link">Home</a>
          </li>
          <li class="main-nav__item">
            <a href="https://mlrit.ac.in/admissions/" class="main-nav__link">Admissions</a>
          </li>
          <li class="main-nav__item">
            <a href="https://mlrit.ac.in/placements/" class="main-nav__link">Placements</a>
          </li>
          <li class="main-nav__item">
            <a href="/pages/chronicles.html" class="main-nav__link" style="color: #E85D1F; font-weight: 700;">Chronicles</a>
          </li>
        </ul>
      </div>
    </nav>
  </header>

  <!-- =====================
       HERO
       ===================== -->
  <section class="chronicles-hero">
    <a href="javascript:history.back()" class="back-link">
      <i class="fas fa-arrow-left"></i> Back
    </a>
    <h1>MLRIT Chronicles</h1>
    <p>News, Achievements, Events &amp; Updates from MLRIT (2024–2026)</p>
  </section>

  <!-- =====================
       CHRONICLES CONTENT
       ===================== -->
  <div class="chronicles-container">
    <div class="filter-bar">
      <label for="categoryFilter">Filter by Category:</label>
      <select id="categoryFilter">
        <option value="all">All Categories</option>
        <option value="Placements">Placements</option>
        <option value="Achievements">Achievements</option>
        <option value="Sports">Sports</option>
        <option value="Events">Events</option>
        <option value="Research">Research</option>
        <option value="Faculty">Faculty</option>
        <option value="Rankings">Rankings</option>
        <option value="Recognition">Recognition</option>
        <option value="Accreditation">Accreditation</option>
        <option value="Other">Other</option>
      </select>

      <label for="searchFilter">Search:</label>
      <input type="text" id="searchFilter" placeholder="Search chronicles..." />
    </div>

    <div id="chroniclesGrid" class="chronicles-grid">
      <!-- Chronicles loaded by JavaScript -->
    </div>

    <div id="noResults" class="no-results" style="display: none;">
      <i class="fas fa-search"></i>
      <h3>No chronicles found</h3>
      <p>Try adjusting your filters or search terms</p>
    </div>
  </div>

  <!-- Search module scripts -->
  <script src="/modules/search/data/searchData.js?v=2"></script>
  <script src="/modules/search/data/chroniclesData.js?v=2"></script>
  <script src="/modules/search/utils/searchEngine.js?v=2"></script>
  <script src="/modules/search/components/SearchOverlay.js?v=2"></script>
  <script src="/modules/search/components/SearchInput.js?v=2"></script>
  <script src="/modules/search/components/FAQList.js?v=2"></script>
  <script src="/modules/search/components/SearchResultsPreview.js?v=2"></script>
  <script src="/modules/search/index.js?v=2"></script>
  <script>
  document.addEventListener('DOMContentLoaded', function () {
      if (window.SearchSystem) {
          window.SearchSystem.init({
              basePath:   '/',
              apiBase:    '',
              debounceMs: 300,
              faqItems:   []
          });
      }

      if (window.ChroniclesData) {
          var allChronicles = window.ChroniclesData.data;
          var grid          = document.getElementById('chroniclesGrid');
          var noResults     = document.getElementById('noResults');
          var categoryFilter = document.getElementById('categoryFilter');
          var searchFilter   = document.getElementById('searchFilter');

          function displayChronicles(chronicles) {
              if (chronicles.length === 0) {
                  grid.style.display = 'none';
                  noResults.style.display = 'block';
                  return;
              }

              grid.style.display = 'grid';
              noResults.style.display = 'none';

              grid.innerHTML = chronicles.map(function(item) {
                  var date = new Date(item.date);
                  var formattedDate = date.toLocaleDateString('en-US', {
                      year: 'numeric',
                      month: 'long',
                      day: 'numeric'
                  });

                  return '<div class="chronicle-card">' +
                      '<span class="chronicle-category">' + item.category + '</span>' +
                      '<div class="chronicle-date"><i class="far fa-calendar"></i> ' + formattedDate + '</div>' +
                      '<h3 class="chronicle-title">' + item.title + '</h3>' +
                      '<p class="chronicle-description">' + item.description + '</p>' +
                      '</div>';
              }).join('');
          }

          function filterChronicles() {
              var category   = categoryFilter.value;
              var searchTerm = searchFilter.value.toLowerCase();

              var filtered = allChronicles.filter(function(item) {
                  var matchesCategory = category === 'all' || item.category === category;
                  var matchesSearch   = searchTerm === '' ||
                      item.title.toLowerCase().indexOf(searchTerm) !== -1 ||
                      item.description.toLowerCase().indexOf(searchTerm) !== -1 ||
                      item.keywords.toLowerCase().indexOf(searchTerm) !== -1;
                  return matchesCategory && matchesSearch;
              });

              // Sort newest first
              filtered.sort(function(a, b) {
                  return new Date(b.date) - new Date(a.date);
              });

              displayChronicles(filtered);
          }

          // Initial render
          filterChronicles();

          categoryFilter.addEventListener('change', filterChronicles);
          searchFilter.addEventListener('input', filterChronicles);
      }
  });
  </script>

</body>
</html>
